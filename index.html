<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfbey</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #quote-text {
            font-size: 1.8rem;
            line-height: 1.6;
            min-height: 300px; /* Sözlerin zıplamaması için alan ayırdık */
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: pre-line;
            transition: opacity 0.4s ease;
            margin-bottom: 20px;
        }

        .hashtag {
            color: #00ced1;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .signature {
            color: #888;
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* BUTON BURADA - Daha belirgin yaptım */
        .next-btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            color: #fff;
            padding: 12px 30px;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
            border-radius: 5px;
        }

        .next-btn:hover {
            border-color: #00ced1; /* Üzerine gelince turkuaz olur */
            background-color: rgba(0, 206, 209, 0.1);
        }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quote-text"></div>
        
        <div class="hashtag">#freeuyghur</div>
        <div class="signature">Wolfbey</div>
        
        <button class="next-btn" onclick="nextQuote()">Eeee sonra</button>
    </div>

    <script>
        // SÖZ LİSTESİ
        const quotes = [
            "\"Burada ne arasın bre yabancı aşağıdaki sonra butonuna basasın. - Wolfbey -\"",
            "Sadece güneşli günlerde yürürsen, hedefine asla varamazsın.",
            "Eee hala burda mısın",
            "Buralar sana göre değil gidesin buradan",
            "01000010 01100101 01101110 00100000 01010111 01101111 01101100 01100110 01100010 01100101 01111001 00100000 00001010 00100011 01000110 01110010 01100101 01100101 00100000 01010101 01111001 01100111 01101000 01110101 01110010 01110011 00001010 00100011 01000110 01110010 01100101 01100101 00100000 01010000 01100001 01101100 01100101 01110011 01110100 01101001 01101110 01100101 00001010"
            
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('quote-text');

        // Sayfa yüklendiğinde ilk sözü basar
        window.onload = function() {
            textElement.innerText = quotes[0];
        };

        function nextQuote() {
            textElement.classList.add('fade-out'); // Önce karart
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                textElement.innerText = quotes[currentIndex];
                textElement.classList.remove('fade-out'); // Sonra geri getir
            }, 400);
        }
    </script>

</body>
</html>
