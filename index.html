<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sözler</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 750px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #quote-text {
            font-size: 1.8rem;
            line-height: 1.6;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: pre-line;
            transition: opacity 0.5s ease;
            margin-bottom: 20px;
        }

        .hashtag {
            color: #00ced1; /* Turkuaz */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px; /* Altındaki isme yakın olması için */
        }

        /* Yeni eklediğimiz Wolfbey stili */
        .signature {
            color: #888; /* Hafif gri, çok göz almasın ama şık dursun */
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        button {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            border-color: #fff;
            color: #fff;
            background-color: rgba(255,255,255,0.05);
        }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quote-text">"Sadece güneşli günlerde yürürsen, hedefine asla varamazsın."</div>
        
        <div class="hashtag">#freeuyghur</div>
        <div class="signature">Wolfbey</div>
        
        <button onclick="nextQuote()">Sonraki Söz</button>
    </div>

    <script>
        const quotes = [
            "\"Sadece güneşli günlerde yürürsen, hedefine asla varamazsın.\"",
            "Hz. Ömer dedi ki:\n\nÇok gülenin heybeti az olur...\nŞaka yapan hafife alınır...\nBir şeyi çok yapan onunla anılır...\nÇok konuşanın yanlışı çok olur...\nYanlışı çok olanın hayâsı azalır...\nHayâsı az olanın takvâsı az olur...\nTakvâsı az olanın kalbi ölür..."
        ];

        let currentIndex = 0;

        function nextQuote() {
            const textElement = document.getElementById('quote-text');
            textElement.classList.add('fade-out');
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                textElement.innerText = quotes[currentIndex];
                textElement.classList.remove('fade-out');
            }, 500);
        }
    </script>

</body>
</html>
